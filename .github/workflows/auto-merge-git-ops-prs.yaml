name: Automerge GitOps Bot PRs

on:
  pull_request_target:
    types:
      - opened

permissions:
  contents: write
  pull-requests: write

jobs:
  call_auto_merge:
    if: github.actor == 'gitops-bot-nikita-danilenko[bot]'
    uses: ./.github/workflows/auto-merge-pull-requests.yaml
    secrets:
      merge-token: ${{ secrets.GITHUB_TOKEN }}

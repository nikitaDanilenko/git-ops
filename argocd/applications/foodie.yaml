apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: foodie
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nikitaDanilenko/git-ops
    targetRevision: main
    path: foodie
  destination:
    server: https://kubernetes.default.svc
    namespace: foodie
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=orphan

